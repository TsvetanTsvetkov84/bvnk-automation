name: Run tests via issue comment

# Lets ANYONE (e.g. BVNK reviewers, without write access) trigger a test run by
# commenting "/run-tests" on any issue — workflow_dispatch is collaborator-only.

on:
  issue_comment:
    types: [created]

permissions:
  contents: write # reused test workflow publishes the report
  issues: write # reaction + result comment

jobs:
  run-tests:
    if: ${{ !github.event.issue.pull_request && contains(github.event.comment.body, '/run-tests') }}
    uses: ./.github/workflows/api-tests.yml
    secrets: inherit

  respond:
    needs: run-tests
    if: always() && !github.event.issue.pull_request && contains(github.event.comment.body, '/run-tests')
    runs-on: ubuntu-latest
    steps:
      - name: Comment with results link
        uses: actions/github-script@v7
        with:
          script: |
            const outcome = '${{ needs.run-tests.result }}' === 'success' ? '✅ passed' : '❌ failed';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const pagesUrl = `https://${context.repo.owner.toLowerCase()}.github.io/${context.repo.repo}/`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Test run ${outcome} — [workflow run](${runUrl}) · [Allure report](${pagesUrl})`,
            });
